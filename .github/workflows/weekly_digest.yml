name: Weekly Digests

on:
  # ── Scheduled runs ──────────────────────────────────────────────────────────
  # Runs every Monday at 05:30 UTC.
  #   05:30 UTC = 07:30 Stockholm summer time (CEST, UTC+2)
  #             = 06:30 Stockholm winter time (CET,  UTC+1)
  # Covers the past 7 days of articles.
  schedule:
    - cron: "30 5 * * 1"  # Monday 05:30 UTC

  # ── Manual trigger ──────────────────────────────────────────────────────────
  # Lets you run from the GitHub Actions tab at any time with custom settings.
  # Go to: Actions → Weekly Digests → Run workflow
  workflow_dispatch:
    inputs:

      digest:
        # ── SELECT DIGEST ─────────────────────────────────────────────────────
        # Which digest to run. Leave blank to run ALL digests (same as scheduled).
        # Must match the "id" field in the corresponding digests/*.toml file.
        # Example: oncology
        description: "Digest to run (leave blank to run all)"
        required: false
        default: ""

      rss_url:
        # ── RSS FEED URL OVERRIDE ─────────────────────────────────────────────
        # Paste a PubMed RSS URL here to use it for THIS RUN ONLY.
        # Leave blank to use the URL(s) in the digest's .toml config file.
        # Only applies when a specific digest is selected above.
        #
        # How to get a PubMed RSS URL:
        #   1. Run your search at https://pubmed.ncbi.nlm.nih.gov/
        #   2. Click "Create RSS" below the result count
        #   3. Set items to 100, click "Create RSS", copy the URL
        description: "RSS feed URL override (leave blank to use config)"
        required: false
        default: ""

      dry_run:
        # ── DRY RUN ───────────────────────────────────────────────────────────
        # Set to true to fetch and process articles WITHOUT sending the email.
        # Useful for testing or previewing a new feed or config change.
        # The HTML preview and classification report are still uploaded as artifacts.
        description: "Dry run — skip sending the email"
        type: boolean
        required: false
        default: false


jobs:
  send-digest:
    name: "Digest: ${{ matrix.digest_id }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      # If one digest fails, keep running the others
      fail-fast: false
      matrix:
        # ── ADD NEW DIGESTS HERE ───────────────────────────────────────────────
        # Each entry runs as a separate parallel job.
        #
        # digest_id       — must match the "id" field in digests/{digest_id}.toml
        # recipient_secret — name of the GitHub secret holding recipient emails
        #
        # To add a new digest:
        #   1. Create digests/{digest_id}.toml with the config
        #   2. Add the GitHub secret for recipients (Settings → Secrets → Actions)
        #   3. Uncomment or add a new entry below
        include:
          - digest_id: general_oncology
            recipient_secret: RECIPIENT_EMAILS
          # - digest_id: haematology
          #   recipient_secret: HAEMATOLOGY_RECIPIENTS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Decide whether this matrix job should actually run.
      # When a digest is selected manually, skip all other jobs.
      # When no digest is selected (scheduled or blank input), run all jobs.
      - name: Check if this digest should run
        id: should_run
        run: |
          INPUT="${{ github.event.inputs.digest }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "${{ matrix.digest_id }}" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping '${{ matrix.digest_id }}' — workflow requested '$INPUT'"
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run digest
        if: steps.should_run.outputs.result == 'true'
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          PUBMED_API_KEY:   ${{ secrets.PUBMED_API_KEY }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}
          # Inject the digest-specific recipient secret under its configured name.
          # The digest config file specifies which env var name to look up.
          ${{ matrix.recipient_secret }}: ${{ secrets[matrix.recipient_secret] }}
        run: |
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          RSS="${{ github.event.inputs.rss_url || '' }}"

          ARGS="--digest ${{ matrix.digest_id }} --save-html digest_preview_${{ matrix.digest_id }}.html"

          if [ -n "$RSS" ]; then
            ARGS="$ARGS --rss-url $RSS"
          fi

          if [ "$DRY" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python main.py $ARGS

      - name: Commit updated seen_pmids
        if: steps.should_run.outputs.result == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_pmids_${{ matrix.digest_id }}.txt
          git diff --staged --quiet || (
            git pull --rebase origin ${{ github.ref_name }} &&
            git commit -m "chore: update seen_pmids (${{ matrix.digest_id }}) [skip ci]" &&
            git push
          )

      # ── Upload artifacts ───────────────────────────────────────────────────
      # Both files are always uploaded so you can inspect them after every run.
      # Find them at: Actions → (select the run) → scroll to Artifacts section
      #
      #   digest-preview-{id}          — the full HTML email (as sent, or preview)
      #   classification-report-{id}   — every article with its AI decision and reason

      - name: Upload digest preview
        if: always() && steps.should_run.outputs.result == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-preview-${{ matrix.digest_id }}
          path: digest_preview_${{ matrix.digest_id }}.html
          retention-days: 14

      - name: Upload classification report
        if: always() && steps.should_run.outputs.result == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: classification-report-${{ matrix.digest_id }}
          path: classification_report.html
          retention-days: 14
